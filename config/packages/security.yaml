security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    role_hierarchy:
        ROLE_SUPER_ADMIN: [ROLE_ADMIN]
        ROLE_ADMIN:       [ROLE_MODERATOR]
        ROLE_MODERATOR:   [ROLE_USER]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        login:
            pattern: ^/(?:[^/]+/)?api/login
            stateless: true
            security: false

        register:
            pattern: ^/(?:[^/]+/)?api/register
            stateless: true
            security: false

        api:
            pattern: ^/(?:[^/]+/)?api
            stateless: true
            jwt: ~

        main:
            lazy: true
            provider: app_user_provider

    access_control:
        - { path: ^/(?:[^/]+/)?api/login, roles: PUBLIC_ACCESS }
        - { path: ^/(?:[^/]+/)?api/register, roles: PUBLIC_ACCESS }
        - { path: ^/(?:[^/]+/)?api/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/(?:[^/]+/)?api/reset-password, roles: PUBLIC_ACCESS }
        # Moderator-accessible endpoints (Lab Sales POS + Dashboard)
        - { path: ^/(?:[^/]+/)?api/admin/labs/dashboard, roles: ROLE_MODERATOR }
        - { path: ^/(?:[^/]+/)?api/admin/products, roles: ROLE_MODERATOR }
        - { path: ^/(?:[^/]+/)?api/admin/labs/customers, roles: ROLE_MODERATOR }
        - { path: ^/(?:[^/]+/)?api/admin/labs/invoice, roles: ROLE_MODERATOR }
        - { path: ^/(?:[^/]+/)?api/admin/orders/walk-in, roles: ROLE_MODERATOR }
        # General admin access (ROLE_ADMIN inherits ROLE_MODERATOR)
        - { path: ^/(?:[^/]+/)?api/admin, roles: ROLE_ADMIN }
        - { path: ^/(?:[^/]+/)?api/super-admin, roles: ROLE_SUPER_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
