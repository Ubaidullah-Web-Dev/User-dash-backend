roles:
    ROLE_USER:
        permissions:
            - POST_VIEW
            - POST_CREATE
            - POST_EDIT_OWN
    
    ROLE_ADMIN:
        permissions:
            - POST_VIEW
            - POST_CREATE
            - POST_EDIT_ALL
    
    ROLE_MODERATOR:
        permissions:
            - POST_VIEW
            - POST_EDIT_ALL
    
    ROLE_ARCHITECTURAL:
        permissions:
            - USER_VIEW
            - USER_EDIT_ROLE
            - USER_DELETE

    ROLE_SUPER_ADMIN:
        permissions:
            - POST_VIEW
            - POST_CREATE
            - POST_EDIT_ALL
            - POST_DELETE
            - USER_VIEW
            - USER_EDIT_ROLE
            - USER_DELETE
            - SETTINGS_EDIT
